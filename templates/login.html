{% extends "base.html" %}

{% block title %}Вход{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card form-card p-4">
                    <h2 class="text-center mb-4" style="color: var(--pink);">Вход в аккаунт</h2>
                    
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Номер телефона</label>
                            <input type="text" class="form-control" name="phone" placeholder="+375 29 123-45-67" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Пароль</label>
                            <input type="password" class="form-control" name="password" required>
                        </div>
                        
                        <button type="submit" class="btn-submit btn w-100">Войти</button>
                        
                        <p class="text-center mt-3">
                            Нет аккаунта? <a href="{{ url_for('register') }}">Зарегистрируйтесь</a>
                        </p>
                    </form>
                    
                    <!-- Блок с контактами для забывших пароль -->
                    <div class="alert alert-info mt-4 text-center" style="background-color: #e8f4f8; border-color: #bee5eb;">
                        <i class="bi bi-question-circle-fill"></i>
                        <strong>Забыли пароль?</strong>
                        <hr>
                        <p class="mb-1">Обратитесь к администратору:</p>
                        <p class="mb-0">
                            <i class="bi bi-telegram"></i> Telegram: <strong>@printlyphoto</strong><br>
                            <i class="bi bi-chat-dots-fill"></i> Viber: <strong>+375 (29) 247-27-16</strong>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
