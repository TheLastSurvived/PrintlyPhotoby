{% extends "base.html" %}

{% block title %}Вход{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card form-card p-4">
                    <h2 class="text-center mb-4" style="color: var(--pink);">Вход в аккаунт</h2>
                    
                    <form method="POST" id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">Номер телефона</label>
                            <input type="tel" class="form-control" name="phone" id="phoneInput" 
                                   placeholder="375291234567" required pattern="[0-9]+" inputmode="numeric">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Пароль</label>
                            <input type="password" class="form-control" name="password" required>
                        </div>
                        
                        <button type="submit" class="btn-submit btn w-100">Войти</button>
                        
                        <p class="text-center mt-3">
                            Нет аккаунта? <a href="{{ url_for('register') }}">Зарегистрируйтесь</a>
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
    let phoneInput = document.getElementById('phoneInput');
    // Удаляем все кроме цифр
    phoneInput.value = phoneInput.value.replace(/\D/g, '');
});
</script>
{% endblock %}
