{% extends "base.html" %}

{% block title %}Вход{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card form-card p-4">
                    <h2 class="text-center mb-4" style="color: var(--pink);">Вход в аккаунт</h2>
                    
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Номер телефона</label>
                            <input type="text" class="form-control" name="phone" placeholder="+375 29 123-45-67" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Пароль</label>
                            <input type="password" class="form-control" name="password" required>
                        </div>
                        
                        <button type="submit" class="btn-submit btn w-100">Войти</button>
                        
                        <p class="text-center mt-3">
                            Нет аккаунта? <a href="{{ url_for('register') }}">Зарегистрируйтесь</a>
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
