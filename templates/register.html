{% extends "base.html" %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card form-card p-4">
                    <h2 class="text-center mb-4" style="color: var(--pink);">Регистрация</h2>
                    
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Номер телефона *</label>
                            <input type="tel" class="form-control" name="phone" placeholder="+375 29 123-45-67" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Пароль *</label>
                            <input type="password" class="form-control" name="password" minlength="6" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">ФИО (необязательно)</label>
                            <input type="text" class="form-control" name="full_name" placeholder="Иванов Иван Иванович">
                        </div>
                        
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="privacy_consent" id="privacyConsent" required>
                                <label class="form-check-label" for="privacyConsent">
                                    Я согласен с <a href="#" data-bs-toggle="modal" data-bs-target="#privacyModal">политикой конфиденциальности</a> *
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="sms_consent" id="smsConsent">
                                <label class="form-check-label" for="smsConsent">
                                    Согласен на получение SMS-уведомлений
                                </label>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn-submit btn w-100">Зарегистрироваться</button>
                        
                        <p class="text-center mt-3">
                            Уже есть аккаунт? <a href="{{ url_for('login') }}">Войдите</a>
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- Модальное окно политики конфиденциальности -->
<div class="modal fade" id="privacyModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Политика конфиденциальности</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                {{ privacy_policy|safe }}
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
