{% extends "base.html" %}

{% block title %}Вход для администратора{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card form-card p-4">
                    <h2 class="text-center mb-4" style="color: var(--pink);">
                        <i class="bi bi-shield-lock-fill"></i> Вход для администратора
                    </h2>
                    
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Логин</label>
                            <input type="text" class="form-control" name="username" placeholder="admin" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Пароль</label>
                            <input type="password" class="form-control" name="password" required>
                        </div>
                        
                        <button type="submit" class="btn-submit btn w-100">Войти</button>
                        
                        <p class="text-center mt-3">
                            <a href="{{ url_for('login') }}">← Вернуться к входу для клиентов</a>
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
